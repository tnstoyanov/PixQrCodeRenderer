<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PIX QR Renderer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 24px 30px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
      width: 320px;
    }

    h1 {
      font-size: 18px;
      margin-bottom: 12px;
    }

    textarea {
      width: 100%;
      height: 100px;
      border-radius: 8px;
      border: 1px solid #ccc;
      padding: 8px;
      font-family: monospace;
      font-size: 12px;
      resize: none;
    }

    button {
      margin-top: 12px;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #00a884;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #008f6e;
    }

    #qrcode {
      margin-top: 16px;
      display: flex;
      justify-content: center;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>PIX BR QR Renderer</h1>

    <textarea id="pixInput"></textarea>

    <button onclick="generateQR()">Render QR</button>

    <div id="qrcode"></div>
  </div>

  <script>
    function generateQR() {
      const container = document.getElementById("qrcode");
      container.innerHTML = ""; // clear old QR

      const data = document.getElementById("pixInput").value.trim();

      if (!data) {
        alert("Please paste a PIX QR payload");
        return;
      }

      new QRCode(container, {
        text: data,
        width: 220,
        height: 220,
        colorDark: "#000000",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.Q
      });
    }
  </script>

</body>
</html>
